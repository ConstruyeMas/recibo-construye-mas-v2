<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="apple-touch-icon" href="icon-192.png">

<title>Recibo Construye Más V2</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  overflow:hidden;
}

/* ===== SPLASH ===== */
#splashScreen{
  position:fixed;
  inset:0;
  background:url('assets/img/splash.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:bgCinematic 3.5s ease forwards;
}

.logoSplash{
  opacity:0;
  transform:translateY(25px);
  animation:logoReveal 1s ease forwards;
  animation-delay:2.5s;
}

.logoSplash img{
  width:220px;
}

@keyframes bgCinematic{
  0%{ transform:scale(1.1); filter:blur(10px) brightness(0.6); }
  100%{ transform:scale(1); filter:blur(0px) brightness(1); }
}

@keyframes logoReveal{
  to{ opacity:1; transform:translateY(0); }
}

/* ===== PANTALLAS ===== */
.screen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:
    opacity 2.5s cubic-bezier(0.22, 1, 0.36, 1),
    transform 2.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  top:0;
  left:0;
}

.content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:400px;
  padding:20px;
  height:100%;
  display:flex;
  flex-direction:column;
}

.form-center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.input-premium{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color:white;
  font-size:18px;
  outline:none;
}

/* ===== SLIDER PREMIUM ===== */

.slider-container{
  width:100%;
  margin-bottom:35px;
}

.slider-track{
  width:75%;
  height:60px;
  margin:0 auto;
  background:rgba(255,255,255,0.15);
  border-radius:50px;
  position:relative;
  overflow:hidden;
}

.slider-fill{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  background:rgba(255,255,255,0.25);
  border-radius:50px;
  transition: width 0.2s ease;
}

.slider-thumb{
  width:60px;
  height:60px;
  position:absolute;
  left:0;
  top:0;
  background:rgba(255,255,255,0.95);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:left 0.25s cubic-bezier(0.22, 1, 0.36, 1);
}

.slider-thumb::after{
  content:"";
  width:28px;
  height:28px;
  background:url('assets/img/icon-192.png') center/contain no-repeat;
}

.slider-text{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:15px;
  letter-spacing:1px;
}

</style>
</head>

<body>

<div id="splashScreen">
  <div class="logoSplash">
    <img src="assets/img/logo.png" alt="Construye Más">
  </div>
</div>

<!-- NOMBRE -->
<div class="screen active" id="screen-nombre" style="background-image:url('assets/img/fondo_nombre.png');">
  <div class="overlay"></div>
  <div class="content">
    <div class="form-center">
      <input type="text" class="input-premium" placeholder="Nombre completo">
    </div>
    <div class="slider-container">
      <div class="slider-track">
        <div class="slider-fill"></div>
        <div class="slider-thumb"></div>
      </div>
    </div>
  </div>
</div>

<!-- CONCEPTO -->
<div class="screen" id="screen-concepto" style="background-image:url('assets/img/fondo_concepto.png');">
  <div class="overlay"></div>
  <div class="content">
    <div class="form-center">
      <input type="text" class="input-premium" placeholder="Nombre de la obra">
    </div>
    <div class="slider-container">
      <div class="slider-track">
        <div class="slider-fill"></div>
        <div class="slider-thumb"></div>
      </div>
    </div>
  </div>
</div>

<!-- MONTO -->
<div class="screen" id="screen-monto" style="background-image:url('assets/img/fondo_monto.png');">
  <div class="overlay"></div>
  <div class="content">
    <div class="form-center">
      <input type="number" class="input-premium" placeholder="$ 0.00">
    </div>
    <div class="slider-container">
      <div class="slider-track">
        <div class="slider-fill"></div>
        <div class="slider-thumb"></div>
      </div>
    </div>
  </div>
</div>

<!-- EMITIR -->
<div class="screen" id="screen-emitir" style="background-image:url('assets/img/fondo_emitir.png');">
  <div class="overlay"></div>
  <div class="content">
    <div class="form-center"></div>
    <div class="slider-container">
      <div class="slider-track">
        <div class="slider-fill"></div>
        <div class="slider-thumb"></div>
      </div>
    </div>
  </div>
</div>

<!-- CONFIRMACION -->
<div class="screen" id="screen-confirmacion" style="background-image:url('assets/img/fondo_confirmacion.png');">
  <div class="overlay"></div>
  <div class="content">
    <div class="form-center">
      <h2 style="color:white;">Listo Ing. Campos</h2>
    </div>
    <div class="slider-container">
      <div class="slider-track">
        <div class="slider-fill"></div>
        <div class="slider-text">Hasta luego</div>
        <div class="slider-thumb"></div>
      </div>
    </div>
  </div>
</div>

<script>

let currentIndex = 0;
let isTransitioning = false;

const screens = [
  "screen-nombre",
  "screen-concepto",
  "screen-monto",
  "screen-emitir",
  "screen-confirmacion"
];

function goTo(nextScreen){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(nextScreen).classList.add("active");
}

function nextScreen(){

  if(isTransitioning) return;

  isTransitioning = true;

  if(currentIndex < screens.length - 1){
    currentIndex++;
  } else {
    currentIndex = 0;
  }

  goTo(screens[currentIndex]);

  setTimeout(()=>{
    isTransitioning = false;
  },2500);

}

document.addEventListener("DOMContentLoaded", function(){
  setTimeout(()=>{
      const splash = document.getElementById("splashScreen");
      if(splash){
        splash.style.transition = "opacity 0.6s ease";
        splash.style.opacity = "0";
        setTimeout(()=> splash.remove(),600);
      }
  },3000);
});

document.querySelectorAll(".slider-thumb").forEach(thumb=>{

  const track = thumb.parentElement;
  const fill = track.querySelector(".slider-fill");

  let startX = 0;
  let currentX = 0;
  let dragging = false;

  thumb.addEventListener("touchstart",(e)=>{
    dragging = true;
    startX = e.touches[0].clientX;
  });

  thumb.addEventListener("touchmove",(e)=>{
    if(!dragging) return;

    const maxMove = track.offsetWidth - thumb.offsetWidth;
    currentX = e.touches[0].clientX - startX;

    if(currentX < 0) currentX = 0;
    if(currentX > maxMove) currentX = maxMove;

    thumb.style.left = currentX + "px";

    const percentage = (currentX / maxMove) * 100;
    fill.style.width = percentage + "%";
  });

  thumb.addEventListener("touchend",()=>{

    const maxMove = track.offsetWidth - thumb.offsetWidth;

    if(currentX > maxMove * 0.85){

      thumb.style.left = maxMove + "px";
      fill.style.width = "100%";

      setTimeout(()=>{
        nextScreen();
        thumb.style.left = "0px";
        fill.style.width = "0%";
      },250);

    }else{
      thumb.style.left = "0px";
      fill.style.width = "0%";
    }

    dragging = false;
    currentX = 0;
  });

});

</script>

</body>
</html>
