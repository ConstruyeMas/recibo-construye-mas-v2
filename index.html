<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-title" content="Construye Más">
<link rel="apple-touch-icon" href="assets/img/icon-180.png">

<title>Recibo Construye Más V2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
/* TODO TU CSS ORIGINAL EXACTAMENTE IGUAL */
/* (lo omití aquí para no hacer este mensaje infinito,
pero en tu archivo debe quedarse exactamente como lo tienes) */
</style>
</head>

<body>

<!-- ================= V2 INTERFAZ ================= -->

<!-- SPLASH -->
<div id="splashScreen">
    <div class="logoSplash">
        <img src="assets/img/logo.png">
    </div>
</div>

<!-- NOMBRE -->
<div class="screen active" id="screen-nombre" style="background-image:url('assets/img/fondo_nombre.png');">
    <div class="overlay"></div>
    <div class="content">
        <div class="form-center">
            <input type="text" id="inputCliente" class="input-premium" placeholder="Nombre completo">
        </div>
        <div class="slider-container">
            <div class="slider-track">
                <div class="slider-fill"></div>
                <div class="slider-thumb">
                    <img src="assets/img/icon-slide.png">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CONCEPTO -->
<div class="screen" id="screen-concepto" style="background-image:url('assets/img/fondo_concepto.png');">
    <div class="overlay"></div>
    <div class="content">
        <div class="form-center">
            <input type="text" id="inputTrabajo" class="input-premium" placeholder="Nombre de la obra">
        </div>
        <div class="slider-container">
            <div class="slider-track">
                <div class="slider-fill"></div>
                <div class="slider-thumb">
                    <img src="assets/img/icon-slide.png">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MONTO -->
<div class="screen" id="screen-monto" style="background-image:url('assets/img/fondo_monto.png');">
    <div class="overlay"></div>
    <div class="content">
        <div class="form-center">
            <input type="number" id="inputMonto" class="input-premium" placeholder="$ 0.00">
        </div>
        <div class="slider-container">
            <div class="slider-track">
                <div class="slider-fill"></div>
                <div class="slider-thumb">
                    <img src="assets/img/icon-slide.png">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- EMITIR -->
<div class="screen" id="screen-emitir" style="background-image:url('assets/img/fondo_emitir.png');">
    <div class="overlay"></div>
    <div class="content">
        <div class="form-center"></div>
        <div class="slider-container">
            <div class="slider-track">
                <div class="slider-fill"></div>
                <div class="slider-text">Emitir comprobante</div>
                <div class="slider-thumb emitir-thumb">
                    <img src="assets/img/icon-slide.png">
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CONFIRMACION -->
<div class="screen" id="screen-confirmacion" style="background-image:url('assets/img/fondo_confirmacion.png');">
    <div class="overlay"></div>
    <div class="content">
        <div class="form-center">
            <div class="mensaje-confirmacion">
                <div class="linea1">Comprobante Emitido</div>
                <div class="linea2" id="nombreConfirmacion"></div>
            </div>
        </div>
    </div>
</div>

<!-- ================= RECIBO OCULTO ================= -->

<div id="recibo" style="display:none; width:816px; height:1056px; position:relative;">
    <img src="assets/recibo_base.png"
         style="position:absolute; top:0; left:0; width:816px; height:1056px;">

    <div id="r_id" style="position:absolute; top:55px; right:13px; font-weight:bold;"></div>
    <div id="r_fecha" style="position:absolute; top:90px; right:13px;"></div>
    <div id="r_trabajo" style="position:absolute; top:300px; left:28px; font-size:28px; font-weight:bold;"></div>
    <div id="r_cliente" style="position:absolute; bottom:240px; left:28px;"></div>
    <div id="r_monto" style="position:absolute; top:455px; width:100%; text-align:center; font-size:32px; font-weight:bold;"></div>
<script>

/* ================= MOTOR ================= */

function generarID(){
    let now = new Date();
    return "CM-" + now.getFullYear() + "-" + Math.floor(Math.random()*10000).toString().padStart(4,"0");
}

function emitirRecibo(){

    const cliente = document.getElementById("inputCliente").value.trim();
    const trabajo = document.getElementById("inputTrabajo").value.trim();
    const monto = parseFloat(document.getElementById("inputMonto").value);

    if(!cliente || !trabajo || !monto){
        alert("Completa todos los campos");
        return false;
    }

    const id = generarID();
    const fecha = new Date().toLocaleDateString("es-MX");

    document.getElementById("r_id").innerText = "ID: " + id;
    document.getElementById("r_fecha").innerText = fecha;
    document.getElementById("r_trabajo").innerText = trabajo;
    document.getElementById("r_cliente").innerText = "Recibí de: " + cliente;
    document.getElementById("r_monto").innerText = "$" + monto.toLocaleString("es-MX") + " MXN";

    document.getElementById("nombreConfirmacion").innerText = cliente;

    const element = document.getElementById("recibo");

    html2pdf().set({
        margin:0,
        filename:`Recibo_${id}.pdf`,
        image:{type:'jpeg',quality:1},
        html2canvas:{scale:3},
        jsPDF:{unit:'in',format:'letter',orientation:'portrait'}
    }).from(element).save();

    return true;
}

/* ================= SLIDER ================= */

document.querySelectorAll(".slider-thumb").forEach(thumb=>{
    thumb.addEventListener("touchend",()=>{

        if(thumb.classList.contains("emitir-thumb")){
            if(emitirRecibo()){
                setTimeout(()=> nextScreen(), 600);
            }
        } else {
            nextScreen();
        }

    });
});

</script>

</body>
</html>
