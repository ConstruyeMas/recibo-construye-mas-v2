<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-title" content="Construye Más">
<link rel="apple-touch-icon" href="assets/img/icon-180.png">

<title>Recibo Construye Más V2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ======= TODO TU CSS ORIGINAL SIN CAMBIOS ======= */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
html,body{height:100%;background:#000;}
body{overflow:hidden;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}
/* SPLASH */
#splashScreen{position:fixed;inset:0;background:url('assets/img/splash.png') center/cover no-repeat;display:flex;align-items:center;justify-content:center;z-index:9999;}
.logoSplash{opacity:0;transform:scale(.9);animation:logoFade 2s ease forwards;}
.logoSplash img{width:400px;}
@keyframes logoFade{to{opacity:1;transform:scale(1);}}

/* MULTIPANTALLA */
.screen{position:fixed;inset:0;min-height:100dvh;display:flex;align-items:center;justify-content:center;flex-direction:column;background-size:cover;background-position:center;opacity:0;transform:translateY(20px);pointer-events:none;transition:opacity 2.5s cubic-bezier(0.22,1,0.36,1),transform 2.5s cubic-bezier(0.22,1,0.36,1);}
.screen.active{opacity:1;transform:translateY(0);pointer-events:auto;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);}
.content{position:relative;z-index:2;width:100%;max-width:400px;padding:20px;height:100%;display:flex;flex-direction:column;}
.form-center{flex:1;display:flex;align-items:center;justify-content:center;}
.input-premium{width:100%;padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);backdrop-filter:blur(10px);color:white;font-size:22px;outline:none;text-align:center;}
.slider-container{width:100%;margin-bottom:35px;}
.slider-track{width:75%;height:60px;margin:0 auto;background:rgba(255,255,255,.05);border-radius:50px;position:relative;overflow:hidden;backdrop-filter:blur(8px);}
.slider-fill{position:absolute;left:0;top:0;height:100%;width:0%;background:rgba(255,255,255,.08);border-radius:50px;transition:width .3s ease;}
.slider-thumb{width:60px;height:60px;position:absolute;left:0;top:0;border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:left .35s cubic-bezier(0.22,1,0.36,1);}
.slider-thumb img{width:100%;height:100%;object-fit:cover;}
.slider-text{position:absolute;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:white;font-size:15px;}
#premium{background-image:url('assets/img/fondo_premium.png');background-size:cover;background-position:center;background-repeat:no-repeat;}
.premium-card{width:85%;max-width:420px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.09);backdrop-filter:blur(3px);border-radius:18px;padding:30px;text-align:center;color:white;z-index:2;}
.premium-header h2{font-weight:300;letter-spacing:2px;}
.premium-header strong{font-weight:800;}
.premium-header p{font-size:13px;opacity:.6;margin-top:4px;}
.premium-body{margin-top:25px;}
.premium-row{margin-bottom:18px;}
.premium-row span{display:block;font-size:12px;opacity:.6;}
.premium-row strong{font-size:18px;letter-spacing:1px;}
.mensaje-confirmacion{text-align:center;color:black;}
.mensaje-confirmacion .linea1{font-size:26px;margin-bottom:8px;font-weight:700;}
.mensaje-confirmacion .linea2{font-size:20px;letter-spacing:1px;font-weight:700;}
</style>
</head>

<body>

<!-- ======= TODO TU HTML ORIGINAL SIN CAMBIOS ======= -->
<!-- (Se mantiene exactamente igual) -->

<script>

const { jsPDF } = window.jspdf;

let currentIndex = 0;
let isTransitioning = false;
let nombre = "";
let concepto = "";
let monto = "";

let pdfFileGenerado = null;
let emisionHabilitada = false;

const screens = [
"screen-nombre",
"screen-concepto",
"screen-monto",
"premium",
"screen-emitir",
"screen-confirmacion"
];

/* ====== MODULO PDF ====== */

function obtenerFechaHoraFormal(){
  const ahora=new Date();
  const dias=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  let minutos=ahora.getMinutes();
  if(minutos<10)minutos="0"+minutos;
  return{
    fechaLarga:`${dias[ahora.getDay()]}, ${ahora.getDate()} de ${meses[ahora.getMonth()]} de ${ahora.getFullYear()}`,
    fechaCorta:`${String(ahora.getDate()).padStart(2,'0')}${String(ahora.getMonth()+1).padStart(2,'0')}${ahora.getFullYear()}`,
    hora:`Hora: ${ahora.getHours()}:${minutos} hrs`
  };
}

function limpiarNombreArchivo(n){
  return n.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]/g,"").substring(0,25);
}

function generarReferencia(){
  return "TC"+Date.now().toString().slice(-7);
}

async function construirPDF(){
  if(pdfFileGenerado)return pdfFileGenerado;

  const {fechaLarga,fechaCorta,hora}=obtenerFechaHoraFormal();
  const referencia=generarReferencia();

  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"letter"});
  doc.setFont("helvetica");
  doc.setFontSize(18);
  doc.text("COMPROBANTE DE PAGO",105,30,{align:"center"});
  doc.setFontSize(12);
  doc.text(`Cliente: ${nombre||""}`,20,60);
  doc.text(`Proyecto: ${concepto||""}`,20,70);
  doc.text(`Monto: ${monto||""}`,20,80);
  doc.text(`Referencia: ${referencia}`,20,100);
  doc.text(fechaLarga,20,120);
  doc.text(hora,20,130);

  const blob=doc.output("blob");
  const nombreArchivo=`CM_${referencia}_${limpiarNombreArchivo(nombre||"Cliente")}_${fechaCorta}.pdf`;
  pdfFileGenerado=new File([blob],nombreArchivo,{type:"application/pdf"});
  return pdfFileGenerado;
}

async function compartirPDF(){
  try{
    const archivo=await construirPDF();
    if(navigator.canShare&&navigator.canShare({files:[archivo]})){
      await navigator.share({files:[archivo],title:"Comprobante Construye Más"});
      emisionHabilitada=true;
    }else{
      const url=URL.createObjectURL(archivo);
      window.open(url,"_blank");
      emisionHabilitada=true;
    }
  }catch(e){}
}

/* ====== TU LOGICA ORIGINAL INTACTA ====== */

function nextScreen(){

if(isTransitioning)return;
isTransitioning=true;

const currentId=screens[currentIndex];

if(currentId==="screen-emitir"&&!emisionHabilitada){
  compartirPDF();
  isTransitioning=false;
  return;
}

if(currentId==="screen-nombre"){
nombre=document.querySelector("#screen-nombre input").value;
}

if(currentId==="screen-concepto"){
concepto=document.querySelector("#screen-concepto input").value;
}

if(currentId==="screen-monto"){
monto=document.getElementById("montoInput").value;
document.getElementById("previewNombre").textContent=nombre;
document.getElementById("previewProyecto").textContent=concepto;
document.getElementById("previewMonto").textContent=monto;
}

if(currentIndex===screens.length-1){
restartFlow();
return;
}

currentIndex++;
goTo(screens[currentIndex]);

setTimeout(()=>{isTransitioning=false;},2500);
}

function restartFlow(){
nombre="";concepto="";monto="";
pdfFileGenerado=null;
emisionHabilitada=false;
currentIndex=0;
goTo("screen-nombre");
isTransitioning=false;
}

</script>

</body>
</html>
