<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-title" content="Construye Más">
<link rel="apple-touch-icon" href="assets/img/icon-180.png">

<title>Recibo Construye Más V2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

html,body{
  height:100%;
  background:#000;
}

body{
  overflow:hidden;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

#splashScreen{
  position:fixed;
  inset:0;
  background:url('assets/img/splash.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.logoSplash{
  opacity:0;
  transform:scale(0.9);
  animation:logoFade 2s ease forwards;
}

.logoSplash img{
  width:260px;
}

@keyframes logoFade{
  to{
    opacity:1;
    transform:scale(1);
  }
}

.screen{
  position:fixed;
  inset:0;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:
    opacity 2.5s cubic-bezier(0.22,1,0.36,1),
    transform 2.5s cubic-bezier(0.22,1,0.36,1);
}

.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

.content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:400px;
  padding:20px;
  height:100%;
  display:flex;
  flex-direction:column;
}

.form-center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.input-premium{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color:white;
  font-size:18px;
  outline:none;
}

.slider-container{
  width:100%;
  margin-bottom:35px;
}

.slider-track{
  width:75%;
  height:60px;
  margin:0 auto;
  background:rgba(255,255,255,0.05);
  border-radius:50px;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(8px);
}

.slider-fill{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  background:rgba(255,255,255,0.08);
  border-radius:50px;
  transition:width 0.3s ease;
}

.slider-thumb{
  width:60px;
  height:60px;
  position:absolute;
  left:0;
  top:0;
  border-radius:50%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:left 0.35s cubic-bezier(0.22,1,0.36,1);
}

.slider-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.slider-text{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:15px;
}

/* ---------- PREMIUM ---------- */

#premium{
  position:relative;
  background:#000;
  overflow:hidden;
}

.watermark{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  z-index:1;
}

.watermark img{
  width:75%;
  max-width:340px;
  opacity:0.07;
  filter:blur(0.5px);
}

.premium-card{
  width:85%;
  max-width:420px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:18px;
  padding:30px;
  text-align:center;
  color:white;
  z-index:2;
  position:relative;
}

.premium-header h2{
  font-weight:300;
  letter-spacing:2px;
}

.premium-header strong{
  font-weight:800;
}

.premium-header p{
  font-size:13px;
  opacity:.6;
  margin-top:4px;
}

.premium-body{
  margin-top:25px;
}

.premium-row{
  margin-bottom:18px;
}

.premium-row span{
  display:block;
  font-size:12px;
  opacity:.6;
}

.premium-row strong{
  font-size:18px;
  letter-spacing:1px;
}

</style>
</head>
<body>
