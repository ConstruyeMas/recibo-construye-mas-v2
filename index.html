<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<title>Recibo Construye Más V2</title>

<style>

/* 🔥 OCUPAR TODA LA PANTALLA */
html, body{
  height:100%;
  background:#000;
}

body{
  margin:0;
  overflow:hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* ===== SPLASH ===== */
#splashScreen{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:url('assets/img/splash.png') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.logoSplash{
  opacity:0;
  transform:scale(0.9);
  animation:logoFade 2s ease forwards;
}

.logoSplash img{
  width:260px;
}

@keyframes logoFade{
  0%{ opacity:0; transform:scale(0.9); }
  100%{ opacity:1; transform:scale(1); }
}

/* ===== PANTALLAS ===== */
.screen{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:translateY(20px);
  pointer-events:none;
  transition:
    opacity 2.5s cubic-bezier(0.22, 1, 0.36, 1),
    transform 2.5s cubic-bezier(0.22, 1, 0.36, 1);
}

.screen.active{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45);
}

.content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:400px;
  padding:20px;
  height:100%;
  display:flex;
  flex-direction:column;
}

.form-center{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

.input-premium{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color:white;
  font-size:18px;
  outline:none;
}

/* ===== SLIDER ===== */

.slider-container{
  width:100%;
  margin-bottom:35px;
}

.slider-track{
  width:75%;
  height:60px;
  margin:0 auto;
  background:rgba(255,255,255,0.05);
  border-radius:50px;
  position:relative;
  overflow:hidden;
  backdrop-filter:blur(8px);
}

.slider-fill{
  position:absolute;
  left:0;
  top:0;
  height:100%;
  width:0%;
  background:rgba(255,255,255,0.08);
  border-radius:50px;
  transition: width 0.3s ease;
}

/* 🔥 MARCO TIPO CANVA */
.slider-thumb{
  width:60px;
  height:60px;
  position:absolute;
  left:0;
  top:0;
  border-radius:50%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:left 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

.slider-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.slider-text{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:15px;
}

</style>
</head>

<body>
