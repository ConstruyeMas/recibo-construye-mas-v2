<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-title" content="Construye Más">
<link rel="apple-touch-icon" href="assets/img/icon-180.png">

<title>Recibo Construye Más V2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
html,body{height:100%;background:#000;}

body{
overflow:hidden;
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}

#splashScreen{
position:fixed;
inset:0;
background:url('assets/img/splash.png') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.logoSplash{
opacity:0;
transform:scale(0.9);
animation:logoFade 2s ease forwards;
}

.logoSplash img{width:260px;}
@keyframes logoFade{to{opacity:1;transform:scale(1);}}

.screen{
position:fixed;
inset:0;
min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background-size:cover;
background-position:center;
opacity:0;
transform:translateY(20px);
pointer-events:none;
transition:opacity 2.5s cubic-bezier(0.22,1,0.36,1),
transform 2.5s cubic-bezier(0.22,1,0.36,1);
}

.screen.active{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.45);
}

.content{
position:relative;
z-index:2;
width:100%;
max-width:400px;
padding:20px;
height:100%;
display:flex;
flex-direction:column;
}

.form-center{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.input-premium{
width:100%;
padding:16px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
color:white;
font-size:18px;
outline:none;
}

.slider-container{width:100%;margin-bottom:35px;}

.slider-track{
width:75%;
height:60px;
margin:0 auto;
background:rgba(255,255,255,0.05);
border-radius:50px;
position:relative;
overflow:hidden;
backdrop-filter:blur(8px);
}

.slider-fill{
position:absolute;
left:0;
top:0;
height:100%;
width:0%;
background:rgba(255,255,255,0.08);
border-radius:50px;
transition:width 0.3s ease;
}

.slider-thumb{
width:60px;
height:60px;
position:absolute;
left:0;
top:0;
border-radius:50%;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
transition:left 0.35s cubic-bezier(0.22,1,0.36,1);
}

.slider-thumb img{
width:100%;
height:100%;
object-fit:cover;
}

.slider-text{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:15px;
}

#premium{
position:relative;
background:#000;
overflow:hidden;
}

.watermark{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
z-index:1;
}

.watermark img{
width:75%;
max-width:340px;
opacity:0.07;
filter:blur(0.5px);
}

.premium-card{
width:85%;
max-width:420px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:18px;
padding:30px;
text-align:center;
color:white;
z-index:2;
position:relative;
}

.premium-header h2{font-weight:300;letter-spacing:2px;}
.premium-header strong{font-weight:800;}
.premium-header p{font-size:13px;opacity:.6;margin-top:4px;}
.premium-body{margin-top:25px;}
.premium-row{margin-bottom:18px;}
.premium-row span{display:block;font-size:12px;opacity:.6;}
.premium-row strong{font-size:18px;letter-spacing:1px;}

</style>
</head>
<body>

<div id="splashScreen">
<div class="logoSplash">
<img src="assets/img/logo.png">
</div>
</div>

<div class="screen active" id="screen-nombre" style="background-image:url('assets/img/fondo_nombre.png');">
<div class="overlay"></div>
<div class="content">
<div class="form-center">
<input type="text" class="input-premium" placeholder="Nombre completo">
</div>
<div class="slider-container">
<div class="slider-track">
<div class="slider-fill"></div>
<div class="slider-thumb"><img src="assets/img/icon-slide.png"></div>
</div>
</div>
</div>
</div>

<div class="screen" id="screen-concepto" style="background-image:url('assets/img/fondo_concepto.png');">
<div class="overlay"></div>
<div class="content">
<div class="form-center">
<input type="text" class="input-premium" placeholder="Nombre de la obra">
</div>
<div class="slider-container">
<div class="slider-track">
<div class="slider-fill"></div>
<div class="slider-thumb"><img src="assets/img/icon-slide.png"></div>
</div>
</div>
</div>
</div>

<div class="screen" id="screen-monto" style="background-image:url('assets/img/fondo_monto.png');">
<div class="overlay"></div>
<div class="content">
<div class="form-center">
<input type="number" class="input-premium" placeholder="$ 0.00">
</div>
<div class="slider-container">
<div class="slider-track">
<div class="slider-fill"></div>
<div class="slider-thumb"><img src="assets/img/icon-slide.png"></div>
</div>
</div>
</div>
</div>

<div class="screen" id="premium">
<div class="watermark">
<img src="assets/img/logo.png" alt="Construye Más">
</div>
<div class="premium-card">
<div class="premium-header">
<h2>Construye <strong>MÁS</strong></h2>
<p>Durango, Zona Norte</p>
</div>
<div class="premium-body">
<div class="premium-row"><span>Cliente</span><strong id="previewNombre"></strong></div>
<div class="premium-row"><span>Proyecto</span><strong id="previewProyecto"></strong></div>
<div class="premium-row"><span>Monto</span><strong id="previewMonto"></strong></div>
<div class="premium-row"><span>Fecha</span><strong id="previewFecha"></strong></div>
<div class="premium-row"><span>No. Comprobante</span><strong id="previewNumero"></strong></div>
</div>
</div>
<div class="slider-container">
<div class="slider-track">
<div class="slider-fill"></div>
<div class="slider-thumb"><img src="assets/img/icon-slide.png"></div>
</div>
</div>
</div>

<div class="screen" id="screen-emitir" style="background-image:url('assets/img/fondo_emitir.png');">
<div class="overlay"></div>
<div class="content">
<div class="form-center"></div>
<div class="slider-container">
<div class="slider-track">
<div class="slider-fill"></div>
<div class="slider-text">Emitir comprobante</div>
<div class="slider-thumb"><img src="assets/img/icon-slide.png"></div>
</div>
</div>
</div>
</div>

<div class="screen" id="screen-confirmacion" style="background-image:url('assets/img/fondo_confirmacion.png');">
<div class="overlay"></div>
<div class="content">
<div class="form-center">
<div class="mensaje-confirmacion">
<div class="linea1">Comprobante Emitido</div>
<div class="linea2">Ing. Campos</div>
</div>
</div>
<div class="slider-container">
<div class="slider-track">
<div class="slider-fill"></div>
<div class="slider-text">Hasta luego</div>
<div class="slider-thumb"><img src="assets/img/icon-slide.png"></div>
</div>
</div>
</div>
</div>

<script>

let currentIndex=0;
let isTransitioning=false;
let nombre="";
let concepto="";
let monto="";
let numeroComprobante=1;

const screens=["screen-nombre","screen-concepto","screen-monto","premium","screen-emitir","screen-confirmacion"];

function goTo(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

async function generarPDF(){

const element=document.querySelector(".premium-card");

const opt={
margin:0.3,
filename:"Comprobante_"+document.getElementById("previewNumero").textContent+".pdf",
image:{type:'jpeg',quality:0.98},
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'letter',orientation:'portrait'}
};

await html2pdf().set(opt).from(element).save();
}

function nextScreen(){
if(isTransitioning)return;
isTransitioning=true;

const currentId=screens[currentIndex];

if(currentId==="screen-nombre"){
nombre=document.querySelector("#screen-nombre input").value;
}

if(currentId==="screen-concepto"){
concepto=document.querySelector("#screen-concepto input").value;
}

if(currentId==="screen-monto"){
monto=document.querySelector("#screen-monto input").value;
const montoFormateado=new Intl.NumberFormat('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2}).format(monto);
const fecha=new Date();
const fechaFormateada=fecha.toLocaleDateString('es-MX');
const numero=String(numeroComprobante).padStart(4,'0');
document.getElementById("previewNombre").textContent=nombre;
document.getElementById("previewProyecto").textContent=concepto;
document.getElementById("previewMonto").textContent="$ "+montoFormateado;
document.getElementById("previewFecha").textContent=fechaFormateada;
document.getElementById("previewNumero").textContent=numero;
numeroComprobante++;
}

if(currentId==="screen-emitir"){
setTimeout(()=>{generarPDF();},400);
}

currentIndex=(currentIndex+1)%screens.length;
goTo(screens[currentIndex]);
setTimeout(()=>{isTransitioning=false;},2500);
}

document.addEventListener("DOMContentLoaded",function(){
setTimeout(()=>{
const splash=document.getElementById("splashScreen");
if(splash){
splash.style.transition="opacity 2.5s ease";
splash.style.opacity="0";
setTimeout(()=>splash.remove(),2500);
}
},3500);
});

document.querySelectorAll(".slider-thumb").forEach(thumb=>{
const track=thumb.parentElement;
const fill=track.querySelector(".slider-fill");
let startX=0,currentX=0,dragging=false;

thumb.addEventListener("touchstart",e=>{dragging=true;startX=e.touches[0].clientX;});
thumb.addEventListener("touchmove",e=>{
if(!dragging)return;
const max=track.offsetWidth-thumb.offsetWidth;
currentX=Math.max(0,Math.min(e.touches[0].clientX-startX,max));
thumb.style.left=currentX+"px";
if(fill)fill.style.width=(currentX/max)*100+"%";
});
thumb.addEventListener("touchend",()=>{
const max=track.offsetWidth-thumb.offsetWidth;
if(currentX>max*0.85){
thumb.style.left=max+"px";
if(fill)fill.style.width="100%";
nextScreen();
setTimeout(()=>{thumb.style.left="0px";if(fill)fill.style.width="0%";},2500);
}else{
thumb.style.left="0px";
if(fill)fill.style.width="0%";
}
dragging=false;
currentX=0;
});
});

</script>

</body>
</html>
